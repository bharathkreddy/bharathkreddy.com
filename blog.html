        margin: 0;
        transition: transform 0.3s ease;
      }
      .card-link:hover .card-title {

      .card-meta {
        font-family: Manrope, sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(0,0,0,0.3);
        margin-top: 0.3rem;

      @media screen and (max-width: 767px) {

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        fetch("/get_blog_posts.php")
          .then((r) => r.json())
          .then((posts) => {
            const listing = document.getElementById("posts-listing");
            if (!posts.length) {
              listing.innerHTML = '<p style="color:rgba(0,0,0,0.4)">No posts yet.</p>';
              return;
            }
            listing.innerHTML = '<div class="card-grid">' + posts
              .map((p) => {
                const imageContent = p.main_image
                  ? `<img src="${p.main_image}" alt="${p.name}" class="card-image" />`
                  : `<div class="card-placeholder">${p.name.charAt(0).toUpperCase()}</div>`;
                return `
                <a href="detail_post.html?slug=${p.slug}" class="card-link">
                  <div class="card-image-wrap">
                    ${imageContent}
                  </div>
                  <div class="card-text">
                    <h2 class="card-title">${p.name}</h2>
                    ${p.category ? `<div class="card-meta">${p.category}</div>` : ""}
                  </div>
                </a>`;
              })
              .join("") + '</div>';
          })
          .catch((err) => console.error("Error fetching posts:", err));
      });
    </script>
