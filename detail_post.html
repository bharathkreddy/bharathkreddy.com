    <script

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const slug = new URLSearchParams(window.location.search).get("slug");

        fetch(`/get_single_post.php?slug=${slug}`)
          .then((r) => r.json())
          .then((p) => {
            const el = document.getElementById("post-detail");
            if (p.error) {
              el.innerHTML = "<p>Post not found.</p>";
              return;
            }
            document.title = p.name + " — BRK";

            const d = p.published_on ? new Date(p.published_on) : null;
            const dateStr = d
              ? d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })
              : "";

            let metaHTML = "";
            if (p.category) metaHTML += `<div class="detail-meta-grid"><span class="detail-meta-label">Category</span><p class="detail-meta-value">${p.category}</p></div>`;
            if (dateStr) metaHTML += `<div class="detail-meta-grid"><span class="detail-meta-label">Date</span><p class="detail-meta-value">${dateStr}</p></div>`;

            el.innerHTML = `
              <h1 class="detail-title">${p.name}</h1>
              ${p.main_image ? `<img src="${p.main_image}" alt="${p.name}" class="detail-image" />` : ""}
              ${metaHTML}
              ${p.summary ? `<div class="detail-meta-grid"><span class="detail-meta-label">Summary</span><p class="detail-meta-value">${p.summary}</p></div>` : ""}
              <hr class="detail-divider" />
              <div class="detail-body">${p.post_body || ""}</div>
            `;
          })
          .catch((err) => console.error("Error:", err));

        fetch("/get_blog_posts.php")
          .then((r) => r.json())
          .then((posts) => {
            const el = document.getElementById("other-posts");
            el.innerHTML = posts
              .filter((p) => p.slug !== slug)
              .map((p) => {
                const d = p.published_on ? new Date(p.published_on) : null;
                const dateStr = d
                  ? d.toLocaleDateString("en-US", { month: "short", year: "numeric" }).toUpperCase()
                  : "";
                return `
                <div class="other-entry">
                  <div class="other-label">
                    <span class="other-meta">${p.category || ""}</span>
                    <span class="other-date">${dateStr}</span>
                  </div>
                  <a href="detail_post.html?slug=${p.slug}" class="other-link">
                    <h3 class="other-title">${p.name}</h3>
                  </a>
                </div>`;
              })
              .join("");
          })
          .catch((err) => console.error("Error:", err));
      });
    </script>
