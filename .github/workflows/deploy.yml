name: 🚀 Deploy via FTP to Hostinger

on:
  push:
    branches:
      - main # Adjust branch if needed

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚧 Checkout your repository
        uses: actions/checkout@v4

      - name: Create .env file dynamically
        run: |
          echo "DB_SERVERNAME=\"${{ secrets.DB_SERVERNAME }}\"" >> .env
          echo "DB_USERNAME=\"${{ secrets.DB_USERNAME }}\"" >> .env
          echo "DB_PASSWORD=\"${{ secrets.DB_PASSWORD }}\"" >> .env
          echo "DB_DATABASE=\"${{ secrets.DB_DATABSE }}\"" >> .env
          echo "ADMIN_PASSWORD_HASH=\"${{ secrets.ADMIN_PASSWORD_HASH }}\"" >> .env

      - name: 🔐 Generate send_email.php with SMTP secrets
        run: |
          sed -e "s|{{SMTP_USER}}|${{ secrets.SMTP_USER }}|g" \
              -e "s|{{SMTP_PASS}}|${{ secrets.SMTP_PASS }}|g" \
              -e "s|{{SMTP_TO}}|${{ secrets.SMTP_TO }}|g" \
              send_email.template.php > send_email.php

      - name: 📂 FTP Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_DESTINATION_DIR }}/
